<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>mk-piclock</title>
    <meta name="theme-color" content="#101713">
    <link rel="icon" href="/favicon.ico?v=1.8.1" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32x32.png?v=1.8.1">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/icons/favicon-16x16.png?v=1.8.1">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-touch-icon.png?v=1.8.1">
    <link rel="manifest" href="/assets/site.webmanifest?v=1.8.1">
    <link rel="stylesheet" href="/assets/css/master.css?v=1.8.1">
</head>
<body>
<div id="auth-gate" class="auth-gate hidden" role="dialog" aria-modal="true" aria-labelledby="auth-title">
    <form id="auth-form" class="auth-card">
        <div class="brand-mark auth-brand"><img src="/assets/icons/android-chrome-192x192.png?v=1.8.1" alt="mK"></div>
        <h1 id="auth-title">Clock password</h1>
        <p class="muted">Enter the password to open the clock controls.</p>
        <label for="auth-password">Password</label>
        <input id="auth-password" name="password" type="password" maxlength="64" autocomplete="current-password" required>
        <div id="auth-error" class="small warn-text hidden" role="alert"></div>
        <button id="auth-submit" class="btn" type="submit">Open Controls</button>
    </form>
</div>
<div id="admin-layout" class="admin-layout">
    <header class="admin-header">
        <div class="brand-block">
            <div class="brand-mark"><img src="/assets/icons/android-chrome-192x192.png?v=1.8.1" alt="mK"></div>
            <div class="header-copy">
                <h1 id="clock-name-heading">Connecting...</h1>
                <p class="small no-margin">Clock controls</p>
            </div>
        </div>
        <div class="header-actions">
            <div class="pill" id="oled-pill">Connecting...</div>
        </div>
    </header>

    <nav id="mobile-menu" class="mobile-menu" aria-label="Main menu"></nav>

    <div class="admin-body">
        <aside class="sidebar">
            <nav id="sidebar-menu" aria-label="Desktop menu"></nav>
        </aside>

        <main class="content">
            <div id="action-notice" class="action-notice hidden" role="status" aria-live="polite"></div>
            <div id="module-host" aria-live="polite">
                <div class="card"><p>Opening clock controls...</p></div>
            </div>
        </main>
    </div>
</div>
<script type="module" src="/assets/js/app.js?v=1.8.1"></script>
</body>
</html>
