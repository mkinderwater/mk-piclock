<section class="panel log-module">
    <div class="card">
        <h2>Recent Activity</h2>
        <p class="page-intro">A history of alarms, messages, uploads, and clock actions. This is mainly useful when troubleshooting.</p>
        <div class="button-row">
            <button class="btn" type="button" id="refresh-log">Refresh</button>
            <button class="btn danger" type="button" id="clear-log">Clear History</button>
        </div>
    </div>
    <div class="card log-card">
        <div id="log-meta" class="small muted">Loading...</div>
        <div id="log-list" class="log-list"></div>
    </div>
</section>
